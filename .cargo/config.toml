# Cross-compilation configuration
# Uncomment the target you want to build for:

# Linux ARM64 (e.g., Raspberry Pi, AWS Graviton)
# [target.aarch64-unknown-linux-gnu]
# linker = "aarch64-linux-gnu-gcc"

# Windows x64 (using MinGW on macOS/Linux)
# [target.x86_64-pc-windows-gnu]
# linker = "x86_64-w64-mingw32-gcc"

# macOS x86_64 (Intel Macs, from ARM64 Mac)
# [target.x86_64-apple-darwin]
# linker = "x86_64-apple-darwin24-clang"

# Linux ARM64 for Android
# [target.aarch64-linux-android]
# linker = "aarch64-linux-android21-clang"

[build]
# Default target (current platform)
# target = "aarch64-apple-darwin"

[profile.release]
opt-level = "z"
lto = "fat"
panic = "abort"
strip = true
codegen-units = 1

[profile.release-minimal]
inherits = "release"
opt-level = "s"
lto = true
